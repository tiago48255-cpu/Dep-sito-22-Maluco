<script>
        // Simple interactivity for quantity buttons
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('click', (e) => {
                const icon = button.querySelector('.material-symbols-outlined');
                if(icon && (icon.innerText === 'add' || icon.innerText === 'remove')) {
                    const span = button.parentElement.querySelector('span:not(.material-symbols-outlined)');
                    let val = parseInt(span.innerText);
                    if(icon.innerText === 'add') val++;
                    if(icon.innerText === 'remove' && val > 1) val--;
                    span.innerText = val;
                }
            });
        });
    </script>
