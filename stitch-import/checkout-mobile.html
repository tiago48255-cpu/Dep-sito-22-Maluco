<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>

<title>Checkout - 22 Maluco</title>

<style>
        body {
            background-color: #000000;
            color: #e5e2e1;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .glass-panel {
            background: rgba(17, 17, 17, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .btn-primary {
            background: linear-gradient(90deg, #1e2fbf 0%, #3d4dd8 100%);
            box-shadow: 0 4px 15px rgba(30, 47, 191, 0.3);
        }
        .neon-glow {
            box-shadow: 0 0 15px rgba(189, 194, 255, 0.1);
        }
        input:focus {
            outline: none;
            border-color: #bdc2ff;
        }
        .custom-radio:checked + label {
            border-color: #bdc2ff;
            background: rgba(189, 194, 255, 0.05);
        }
        .custom-radio:checked + label .radio-circle {
            background-color: #bdc2ff;
            border-color: #bdc2ff;
        }
        .custom-radio:checked + label .radio-inner {
            background-color: #00149f;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen pb-32">
<!-- Top AppBar -->
<header class="sticky top-0 z-50 bg-surface/80 dark:bg-surface/80 backdrop-blur-xl border-b border-white/10 flex justify-between items-center w-full px-margin-mobile py-base shadow-md">
<button class="text-primary active:scale-95 duration-150" onclick="window.history.back()">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-label-md font-label-md text-primary dark:text-primary">Checkout</h1>
<div class="w-6"></div> <!-- Spacer for centering -->
</header>
<main class="max-w-[600px] mx-auto px-margin-mobile pt-lg space-y-lg">
<!-- Delivery Address Section -->
<section>
<h2 class="text-label-lg font-label-lg text-on-surface-variant mb-sm uppercase tracking-wider">Endereço de entrega</h2>
<div class="glass-panel p-md rounded-xl flex items-center gap-md">
<div class="bg-primary-container/20 p-base rounded-lg">
<span class="material-symbols-outlined text-primary">location_on</span>
</div>
<div class="flex-1">
<p class="text-body-md font-bold text-on-surface">Caioaba, Nova Iguaçu - RJ</p>
<p class="text-body-sm text-on-surface-variant">Rua Exemplo, 123</p>
</div>
<button class="text-primary text-label-md font-label-md hover:opacity-80">Alterar</button>
</div>
</section>
<!-- Payment Methods Section -->
<section>
<h2 class="text-label-lg font-label-lg text-on-surface-variant mb-sm uppercase tracking-wider">Pagamento</h2>
<div class="space-y-base">
<!-- PIX -->
<div class="relative">
<input checked="" class="hidden custom-radio" id="pix" name="payment" type="radio"/>
<label class="glass-panel p-md rounded-xl flex items-center gap-md border border-white/5 cursor-pointer transition-all" for="pix">
<div class="radio-circle w-5 h-5 rounded-full border-2 border-outline flex items-center justify-center">
<div class="radio-inner w-2.5 h-2.5 rounded-full"></div>
</div>
<span class="material-symbols-outlined text-on-surface-variant">pin</span>
<span class="text-body-md font-body-md text-on-surface flex-1">PIX</span>
<span class="bg-tertiary-container text-tertiary text-[10px] px-2 py-0.5 rounded-full font-bold">5% OFF</span>
</label>
</div>
<!-- Credit Card -->
<div class="relative">
<input class="hidden custom-radio" id="credit" name="payment" type="radio"/>
<label class="glass-panel p-md rounded-xl flex items-center gap-md border border-white/5 cursor-pointer transition-all" for="credit">
<div class="radio-circle w-5 h-5 rounded-full border-2 border-outline flex items-center justify-center">
<div class="radio-inner w-2.5 h-2.5 rounded-full"></div>
</div>
<span class="material-symbols-outlined text-on-surface-variant">credit_card</span>
<span class="text-body-md font-body-md text-on-surface">Cartão de Crédito</span>
</label>
</div>
<!-- Debit Card -->
<div class="relative">
<input class="hidden custom-radio" id="debit" name="payment" type="radio"/>
<label class="glass-panel p-md rounded-xl flex items-center gap-md border border-white/5 cursor-pointer transition-all" for="debit">
<div class="radio-circle w-5 h-5 rounded-full border-2 border-outline flex items-center justify-center">
<div class="radio-inner w-2.5 h-2.5 rounded-full"></div>
</div>
<span class="material-symbols-outlined text-on-surface-variant">payments</span>
<span class="text-body-md font-body-md text-on-surface">Cartão de Débito</span>
</label>
</div>
<!-- Cash -->
<div class="relative">
<input class="hidden custom-radio" id="cash" name="payment" type="radio"/>
<label class="glass-panel p-md rounded-xl flex items-center gap-md border border-white/5 cursor-pointer transition-all" for="cash">
<div class="radio-circle w-5 h-5 rounded-full border-2 border-outline flex items-center justify-center">
<div class="radio-inner w-2.5 h-2.5 rounded-full"></div>
</div>
<span class="material-symbols-outlined text-on-surface-variant">attach_money</span>
<span class="text-body-md font-body-md text-on-surface">Dinheiro</span>
</label>
</div>
</div>
</section>
<!-- Change Field (Conditional for Cash) -->
<section id="change-section">
<h2 class="text-label-lg font-label-lg text-on-surface-variant mb-sm uppercase tracking-wider">Troco para quanto?</h2>
<div class="relative">
<input class="w-full bg-[#0A0A0A] border border-white/10 rounded-xl p-md text-on-surface focus:border-primary transition-colors pl-xl" placeholder="R$ 50,00" type="text"/>
<span class="absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant material-symbols-outlined text-[18px]">payments</span>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]">close</span>
</button>
</div>
</section>
<!-- Observation Section -->
<section>
<h2 class="text-label-lg font-label-lg text-on-surface-variant mb-sm uppercase tracking-wider">Observação (opcional)</h2>
<textarea class="w-full bg-[#0A0A0A] border border-white/10 rounded-xl p-md text-on-surface focus:border-primary transition-colors resize-none" placeholder="Adicionar observação..." rows="2"></textarea>
</section>
<!-- Summary Section -->
<section class="glass-panel p-md rounded-2xl space-y-sm">
<div class="flex justify-between items-center text-body-md">
<span class="text-on-surface-variant">Subtotal</span>
<span class="text-on-surface font-semibold">R$ 33,00</span>
</div>
<div class="flex justify-between items-center text-body-md">
<span class="text-on-surface-variant">Taxa de entrega</span>
<span class="text-on-surface font-semibold">R$ 5,00</span>
</div>
<div class="flex justify-between items-center text-body-md text-tertiary">
<span>Desconto PIX</span>
<span class="font-semibold">- R$ 1,65</span>
</div>
<div class="pt-base border-t border-white/5 flex justify-between items-center">
<span class="text-headline-sm font-headline-sm text-on-surface">Total</span>
<span class="text-headline-sm font-headline-sm text-primary">R$ 36,35</span>
</div>
</section>
</main>
<!-- Bottom Action Bar -->
<div class="fixed bottom-0 left-0 right-0 p-margin-mobile bg-surface/90 backdrop-blur-2xl border-t border-white/5 z-50">
<div class="max-w-[600px] mx-auto">
<button class="w-full btn-primary text-on-primary font-headline-sm py-md rounded-xl active:scale-[0.98] transition-transform flex items-center justify-center gap-sm">
                Confirmar pedido
                <span class="material-symbols-outlined">chevron_right</span>
</button>
</div>
</div>
<!-- Interactivity Script -->
<script>
        // Simple logic to show/hide change field based on payment method
        const paymentOptions = document.querySelectorAll('input[name="payment"]');
        const changeSection = document.getElementById('change-section');

        paymentOptions.forEach(option => {
            option.addEventListener('change', (e) => {
                if (e.target.id === 'cash') {
                    changeSection.style.display = 'block';
                } else {
                    changeSection.style.display = 'none';
                }
            });
        });

        // Initial state
        if (!document.getElementById('cash').checked) {
            changeSection.style.display = 'none';
        }
    </script>
</body></html>
